name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run gofmt check
        run: |
          gofmt -s -l .
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "::error::Code is not formatted. Run 'make fmt' and commit the changes."
            exit 1
          fi

      - name: Run go vet
        run: make vet

      - name: Run tests
        run: make test
